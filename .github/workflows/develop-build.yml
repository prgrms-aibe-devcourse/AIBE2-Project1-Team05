name: git push into another repo to deploy to vercel

on:
  pull_request:
    types: [closed]
    branches: [develop]

jobs:
  build:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    container: pandoc/latex
    steps:
      - uses: actions/checkout@v4

      - name: Install mustache (to update the date)
        run: apk add ruby && gem install mustache

      - name: creates output
        run: sh ./build.sh

      - name: Pushes to another repository
        id: push_directory
        uses: cpina/github-action-push-to-another-repository@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.INUK_GITHUB_KEY }}
        with:
          source-directory: 'output'
          destination-github-username: INUK-ai
          destination-repository-name: AIBE2-Project1-Team05
          user-email: ${{ secrets.INUK_ACCOUNT_EMAIL }}
          commit-message: '[AutoSync] ${{ github.event.pull_request.title }}'
          target-branch: develop

      - name: Test get variable exported by push-to-another-repository
        run: echo $DESTINATION_CLONED_DIRECTORY