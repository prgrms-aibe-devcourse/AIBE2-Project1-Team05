<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 추천 시작</title>
  <link rel="stylesheet" href="css/style.css">
  <style>

    body {
      background-color: #202B3B; /* 딥 네이비 배경 */
      margin: 0;
      padding: 0;
      font-family: 'Noto Sans', sans-serif;
      color: #FFFFFF; /* 기본 텍스트 흰색 */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .tracking-icon {
      width: 48px;
      height: 48px;
      margin-bottom: 1.2rem;
    }

    .title-text {
      font-size: 1.4rem;
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    .map-image {
    width: 300px;
    height: 300px;
    border-radius: 50%;
    object-fit: cover;
    background-color: transparent; /* 배경 제거 */
    padding: 0; /* 패딩 제거 */
    border: 0px solid #E3E6F3; /* 얇고 깔끔한 border 직접 추가 */
    box-sizing: border-box;
    margin-bottom: 2rem;
}

    .start-button {
      background-color: #E3E6F3; /* 버튼 배경: 라벤더 그레이 */
      color: #202B3B; /* 버튼 글씨: 딥 네이비 */
      border: none;
      border-radius: 30px;
      padding: 1.2rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      width: 80%;
      max-width: 300px;
      cursor: pointer;
    }

    .start-button:hover {
      background-color: #d5d9e6;
    }
  </style>
</head>
<body>

  <!-- 상단 트래킹 아이콘 -->
  <img src="assets/images/tracking.png" alt="Tracking Icon" class="tracking-icon">

  <!-- 메인 텍스트 -->
  <div class="title-text">
    당신의 여행 스타일에<br>딱 맞는 일정을 추천해요.
  </div>

  <!-- 원형 지도 이미지 -->
  <img src="assets/images/mapai1.png" alt="추천 경로 지도" class="map-image">
    <br>

  <!-- 바로 추천받기 버튼 -->
  <button class="start-button" onclick="location.href='ai-question1.html'">
    바로 추천받기
  </button>

</body>
</html>
