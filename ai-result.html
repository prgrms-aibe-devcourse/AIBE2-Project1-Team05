<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PLANITE 여행 일정 추천</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/result.css">
    <link rel="stylesheet" href="./css/save-plan.css"> <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="loading-indicator">
        <img src="assets/images/planite_splash.png" alt="로딩 중..." class="loading-logo">
        <p>PLANITE 가 최적의 여행 일정을 생성 중입니다...</p>
    </div>

    <div class="wrapper"></div>
    <div class="container hidden" id="result-container">
        <header class="app-header">
            <img id="header-image" src="https://placehold.co/80x80" alt="대표 이미지" class="header-image">
            <h1 id="header-title"></h1> </header>

        <section class="map-section">
            <div class="map-placeholder">
                <span class="map-text">📍 지도 기반 추천 장소 표시</span>
                <div id="google-map"></div> </div>
        </section>

        <nav class="day-tabs" id="day-tabs"></nav> <main class="itinerary-content" id="itinerary-content"></main> <div class="save-button-container">
            <button id="save-to-my-plan" class="save-to-my-plan">
                <i class="fas fa-calendar-plus"></i> 내 일정으로 담기
            </button>
        </div>
    </div> <script src="./js/config.js"></script>
    <script src="./js/result.js" defer></script>
    <script>
      // Google Maps 스크립트 로드 및 로딩 인디케이터 제어 함수
      function loadGoogleMapsScript() {
          if (typeof window.GOOGLE_MAP_API_KEY === 'string' && window.GOOGLE_MAP_API_KEY) {
              if (!document.querySelector('script[src*="maps.googleapis.com"]')) {
                  const script = document.createElement('script');
                  script.src = `https://maps.googleapis.com/maps/api/js?key=${window.GOOGLE_MAP_API_KEY}&callback=initMap&libraries=marker&v=weekly`;
                  script.async = true;
                  script.defer = true;
                  script.onerror = () => {
                      console.error('Google Maps 스크립트를 로드하지 못했습니다.');
                      const mapTextElement = document.querySelector('.map-placeholder .map-text');
                      if (mapTextElement) { mapTextElement.textContent = '지도 로드 오류.'; }
                      const mapElement = document.getElementById('google-map');
                      if(mapElement) mapElement.style.display = 'none';
                      hideLoadingIndicator(true, '지도 로드에 실패했습니다.');
                  };
                  document.body.appendChild(script);
                  console.log("Google Maps 스크립트 로드 시작...");
              } else {
                  console.log("Google Maps 스크립트 이미 로드됨/로드 중.");
              }
          } else {
              console.error('구글맵 API 키가 없습니다.');
              hideLoadingIndicator(true, '지도 설정을 불러올 수 없습니다.');
          }
      }

      function hideLoadingIndicator(isError = false, errorMessage = '일정 생성에 실패했습니다.') {
          const loadingIndicator = document.getElementById('loading-indicator');
          const resultContainer = document.getElementById('result-container');
          if (loadingIndicator) {
              loadingIndicator.classList.add('hidden');
              console.log(`로딩 인디케이터 숨김 (오류: ${isError})`);
          }
          if (resultContainer) {
              if (!isError) {
                  resultContainer.classList.remove('hidden');
                  console.log("결과 컨테이너 표시");
              } else {
                  resultContainer.innerHTML = `<p style="color: #ff6b6b; text-align: center; padding: 50px;">${errorMessage}</p>`;
                  resultContainer.classList.remove('hidden');
                  console.error("오류 메시지 표시:", errorMessage);
              }
          }
      }

      document.addEventListener('DOMContentLoaded', () => {
          // 공통 레이아웃 적용 (하단 네비 등 - 필요시 layout.js 호출)
          if (typeof applyCommonLayout === 'function') {
              applyCommonLayout();
          }
          // result.js의 DOMContentLoaded에서 AI 일정 생성 시작
      });
    </script>
    </body>
</html>
