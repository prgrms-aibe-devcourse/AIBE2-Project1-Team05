<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 여행 일정 추천</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/result.css">
    <link rel="stylesheet" href="./css/save-plan.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* 로딩 인디케이터 스타일 */
        #loading-indicator { display: flex; flex-direction: column; justify-content: center; align-items: center; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(30, 39, 52, 0.9); z-index: 1001; color: #e3e6f3; text-align: center; font-size: 16px; }
        #loading-indicator p { margin-top: 15px; }
        .spinner { border: 4px solid rgba(255, 255, 255, 0.3); border-radius: 50%; border-top: 4px solid #5e9dee; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none !important; } /* 로딩 숨김용 */
    </style>
</head>
<body>
    <div id="loading-indicator">
        <div class="spinner"></div>
        <p>AI가 최적의 여행 일정을 생성 중입니다...</p>
    </div>

    <div class="wrapper"></div>
    <div class="container hidden" id="result-container"> <header class="app-header">
            <img id="header-image" src="" alt="대표 이미지" class="header-image"> <h1 id="header-title"></h1>
        </header>
        <section class="map-section">
            <div class="map-placeholder">
                <span class="map-text">📍 지도 로딩 중...</span>
                <div id="google-map"></div>
            </div>
        </section>
        <nav class="day-tabs" id="day-tabs"></nav>
        <main class="itinerary-content" id="itinerary-content"></main>
        <div class="save-button-container">
            <button id="save-to-my-plan" class="save-to-my-plan">
                <i class="fas fa-calendar-plus"></i> 내 일정으로 담기
            </button>
        </div>
    </div>

    <script src="./js/config.js"></script>
    <script src="./js/result.js" defer></script>
    <script>
      // Google Maps 스크립트 로드 함수
      function loadGoogleMapsScript() {
          console.log("loadGoogleMapsScript 함수 호출됨");
          if (typeof window.GOOGLE_MAP_API_KEY === 'string' && window.GOOGLE_MAP_API_KEY && window.GOOGLE_MAP_API_KEY !== 'YOUR_Maps_API_KEY') {
              if (!document.querySelector('script[src*="maps.googleapis.com"]')) {
                const script = document.createElement('script');
                // *** 라이브러리 수정: marker와 geometry 추가 ***
                script.src = `https://maps.googleapis.com/maps/api/js?key=${window.GOOGLE_MAP_API_KEY}&callback=initMap&libraries=marker,geometry&v=weekly`; // geometry 추가!
                script.async = true;
                script.defer = true;
                script.onerror = () => {
                    console.error('Google Maps 스크립트 로드 실패.');
                    if (typeof hideLoadingIndicator === 'function') { hideLoadingIndicator(true, '지도 로드 실패'); }
                    const mapPlaceholder = document.getElementById('google-map');
                    if(mapPlaceholder) mapPlaceholder.innerHTML = '<p style="color: #ff6b6b;">지도 로드 실패</p>';
                };
                document.body.appendChild(script);
                console.log("Google Maps 스크립트 로드 시작 (geometry 포함)...");
              } else {
                 console.log("Google Maps 스크립트 이미 로드됨/로드 중.");
              }
          } else {
              console.error('Google Maps API 키 미설정.');
              if (typeof hideLoadingIndicator === 'function') { hideLoadingIndicator(true, '지도 설정 로드 불가.'); }
              const mapPlaceholder = document.getElementById('google-map');
              if(mapPlaceholder) mapPlaceholder.innerHTML = '<p style="color: #ff6b6b;">API 키 오류</p>';
          }
      }

      // 로딩 인디케이터 숨기는 함수
      function hideLoadingIndicator(isError = false, errorMessage = '일정 생성 실패.') {
          console.log(`hideLoadingIndicator 호출됨 (isError: ${isError})`);
          const loadingIndicator = document.getElementById('loading-indicator');
          const resultContainer = document.getElementById('result-container');
          if (loadingIndicator) { loadingIndicator.classList.add('hidden'); }
          if (resultContainer) {
              if (isError) { resultContainer.innerHTML = `<p style="color: #ff6b6b; text-align: center; padding: 50px;">${errorMessage}</p>`; }
              resultContainer.classList.remove('hidden'); // 결과 컨테이너 표시
          }
      }

      // DOM 로드 완료 후 실행
      document.addEventListener('DOMContentLoaded', () => {
          if (typeof applyCommonLayout === 'function') { applyCommonLayout(); }
          // 메인 로직은 result.js에서 실행
      });

    </script>
    <script src="js/layout.js"></script> </body>
</html>
