<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>기간 선택</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>
<body>
  <header class="header">
    <h1>여행 기간을 선택하세요</h1>
  </header>

  <main class="container">
    <section class="calendar-select">
      <h2>여행할 날짜를 골라주세요</h2>
      <input type="text" id="date-range" placeholder="출발일 - 도착일 선택" readonly style="width:100%; padding: 1rem; margin-bottom: 1rem;"/>

      <button onclick="saveDates()">다음 →</button>
    </section>
  </main>

  <footer class="footer">
    <small>© 2025 Trip Planner</small>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="js/calendar.js"></script>
</body>
</html>
