<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>여행 다이어리</title>
  <link rel="stylesheet" href="css/style.css">


  <script src="js/config.js"></script>

  <script>
    const script = document.createElement('script');
    script.src = `https://maps.googleapis.com/maps/api/js?key=${CONFIG.GOOGLE_MAPS_API_KEY}`;
    document.head.appendChild(script);
  </script>
</head>
<body>
  <header class="header">
    <h1>My Travel Map</h1>
    <p>지도 위를 클릭해 사진을 추가하세요</p>
  </header>

  <main class="container map-layout">
    <div id="map" style="width: 100%; height: 500px; background-color: #eaeaea;"></div>

    <input type="file" id="photo-upload" accept="image/*" style="display: none;" />
  </main>

  <footer class="footer">
    <small>© 2025 Trip Planner</small>
  </footer>

  <script src="js/diary.js"></script>
</body>
</html>
