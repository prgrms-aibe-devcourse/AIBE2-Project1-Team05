<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PLANITE 인트로</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      background-color: #1c2331;
      color: #ffffff;
      margin: 0;
      padding: 0;
      font-family: 'Noto Sans', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      opacity: 1;
      transition: opacity 1s ease; /* 부드럽게 1초 동안 투명도 변화 */
    }
    img {
      width: 150px;
      height: auto;
      margin-bottom: 1rem;
    }
    .logo-text {
      font-size: 2rem;
      font-weight: bold;
    }
    .slogan {
      margin-top: 0.5rem;
      font-size: 1rem;
      color: #cccccc;
    }
  </style>
</head>
<body>

  <img src="assets/images/planite.png" alt="Planite 로고">
  <div class="logo-text">Planite</div>
  <div class="slogan">PLANITE가 당신의 여행 궤도를 설계합니다</div>

  <script>
    setTimeout(() => {
      // 1단계: opacity를 0으로 줄이기 (페이드아웃 시작)
      document.body.style.opacity = 0;

      // 2단계: transition이 끝난 후 페이지 이동
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 1000); // 1초 후 이동 (transition 시간과 맞춰줌)
    }, 2000); // 초기에 2초 기다렸다가 페이드아웃 시작
  </script>

</body>
</html>
