<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Planite Main Page</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <div class="wrapper">
      <div class="container">
        <div class="welcome">
          <h2>
            <span class="highlight" id="username">사용자</span>님, 환영합니다!
          </h2>
          <p>같이 새 일정을 만들어 볼까요?</p>
        </div>
        <button class="ai-button" onclick="location.href='ai-intro.html'">
          AI 추천 일정 받아보기!
        </button>

        <div class="section-title">요즘 핫한 여행지를 소개해드립니다!</div>
        <div class="card-list-wrapper">
          <div class="card-list">
            <div class="card" onclick="alert('프랑스 테마 여행')">
              <img src="assets/images/france.jpg" alt="프랑스" />
              <div class="card-text">프랑스, 툴루즈</div>
            </div>
            <div class="card" onclick="alert('일본 테마 여행')">
              <img src="assets/images/japan.jpg" alt="일본" />
              <div class="card-text">일본, 오사카</div>
            </div>
            <div class="card" onclick="alert('베트남 테마 여행')">
              <img src="assets/images/vietnam.jpg" alt="베트남" />
              <div class="card-text">베트남, 호치민</div>
            </div>
            <div class="card" onclick="alert('대한민국 테마 여행')">
              <img src="assets/images/seoul.jpg" alt="서울" />
              <div class="card-text">대한민국, 서울</div>
            </div>
            <div class="card" onclick="alert('중국 테마 여행')">
              <img src="assets/images/china.jpg" alt="베이징" />
              <div class="card-text">중국, 베이징</div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="js/main.js"></script>
    <script src="js/layout.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", applyCommonLayout);
      applyCommonLayout();
    </script>
  </body>
</html>
