<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Planite Main Page</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #1e2734;
        font-family: "Pretendard", sans-serif;
        color: #e3e6f3;
        display: flex;
        flex-direction: column;
        align-items: center;
        user-select: none;
      }
      .container {
        width: 100%;
        max-width: 390px;
        padding: 20px;
      }
      .welcome {
        text-align: center;
        margin-top: 90px;
        margin-bottom: 10px;
        opacity: 0;
        transform: translateY(-20px);
        animation: fadeInDown 0.8s forwards;
      }
      @keyframes fadeInDown {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .welcome h2 {
        margin: 0;
        font-size: 22px;
        color: #e3e6f3;
      }
      .welcome p {
        margin: 10px 0 0;
        font-size: 14px;
        color: #a0a4b8;
      }
      .highlight {
        color: #5e9dee;
      }
      .ai-button {
        margin-top: 20px;
        padding: 15px;
        width: 100%;
        background-color: #e3e6f3;
        color: #1e2734;
        font-weight: bold;
        border: none;
        border-radius: 24px;
        font-size: 16px;
        cursor: pointer;
        transition: background-color 0.3s;
      }
      .ai-button:hover {
        background-color: #d0d4e4;
      }
      .section-title {
        margin-top: 30px;
        margin-bottom: 10px;
        font-size: 14px;
        text-align: left;
        opacity: 0;
        animation: fadeIn 1s 0.5s forwards;
      }
      .card-list-wrapper {
        overflow-x: auto;
        scroll-behavior: smooth;
        -ms-overflow-style: none;
        scrollbar-width: none;
        width: 100%;
        user-select: none;
        margin-top: 20px;
      }
      .card-list-wrapper::-webkit-scrollbar {
        display: none;
      }
      .card-list {
        display: flex;
        gap: 12px;
        padding-bottom: 20px;
        padding-top: 10px;
        width: max-content;
        user-select: none;
      }
      .card {
        width: 120px;
        height: 160px;
        background-color: #2d3748;
        border-radius: 12px;
        position: relative;
        overflow: hidden;
      }
      .card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 12px;
        pointer-events: none;
      }
      .card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        border-radius: 12px;
      }
      .card-text {
        position: absolute;
        bottom: 8px;
        left: 8px;
        font-size: 12px;
        background: rgba(30, 39, 52, 0.7);
        padding: 2px 6px;
        border-radius: 6px;
        z-index: 1;
      }
      .bottom-nav {
        width: 100%;
        max-width: 390px;
        background-color: #5e9dee;
        height: 56px;
        display: flex;
        justify-content: space-around;
        align-items: center;
        position: fixed;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        border-top-left-radius: 12px;
        border-top-right-radius: 12px;
      }
      .bottom-nav button {
        background: none;
        border: none;
        color: white;
        font-size: 20px;
        cursor: pointer;
      }
      @keyframes fadeIn {
        to {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="welcome">
        <h2>
          <span class="highlight" id="username">사용자</span>님, 환영합니다!
        </h2>
        <p>같이 새 일정을 만들어 볼까요?</p>
      </div>
      <button class="ai-button" onclick="location.href='ai_intro.html'">
        AI 추천 일정 받아보기!
      </button>

      <div class="section-title">요즘 핫한 여행지를 소개해드립니다!</div>
      <div class="card-list-wrapper">
        <div class="card-list">
          <div class="card" onclick="alert('프랑스 테마 여행')">
            <img src="assets/images/france.jpg" alt="프랑스" />
            <div class="card-text">프랑스, 스트라스부르</div>
          </div>
          <div class="card" onclick="alert('일본 테마 여행')">
            <img src="assets/images/japan.png" alt="일본" />
            <div class="card-text">일본, 오사카</div>
          </div>
          <div class="card" onclick="alert('베트남 테마 여행')">
            <img src="assets/images/vietnam.png" alt="베트남" />
            <div class="card-text">베트남, 호이안</div>
          </div>
          <div class="card" onclick="alert('추가 여행지')">
            <img src="assets/images/seoul.png" alt="추가" />
            <div class="card-text">대한민국, 서울</div>
          </div>
          <div class="card" onclick="alert('추가 여행지')">
            <img src="assets/images/beijing.jpg" alt="추가" />
            <div class="card-text">중국, 베이징</div>
          </div>
        </div>
      </div>
    </div>

    <div class="bottom-nav">
      <button onclick="location.href='main.html'">🏠</button>
      <button>🔍</button>
      <button>➕</button>
      <button>🔔</button>
      <button onclick="location.href='mypage.html'">👤</button>
    </div>

    <script>
      const username = "인봉";
      document.getElementById("username").innerText = username;
    </script>

    <script>
      const slider = document.querySelector(".card-list-wrapper");
      let isDragging = false;
      let startX;
      let scrollLeft;

      slider.addEventListener("mousedown", (e) => {
        isDragging = true;
        startX = e.pageX - slider.offsetLeft;
        scrollLeft = slider.scrollLeft;
        slider.style.cursor = "grabbing";
      });

      slider.addEventListener("mouseleave", () => {
        isDragging = false;
        slider.style.cursor = "grab";
      });

      slider.addEventListener("mouseup", () => {
        isDragging = false;
        slider.style.cursor = "grab";
      });

      slider.addEventListener("mousemove", (e) => {
        if (!isDragging) return;
        e.preventDefault();
        const x = e.pageX - slider.offsetLeft;
        const walk = (x - startX) * 1.5;
        slider.scrollLeft = scrollLeft - walk;
      });

      slider.addEventListener("mouseenter", () => {
        slider.style.cursor = "grab";
      });
    </script>
  </body>
</html>
