<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>프로필 페이지</title>
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/mypage.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
  </head>

  <body>
    <div class="wrapper">
      <div class="profile-header">
        <div class="profile-image-area">
          <img
            id="profileImage"
            src="./assets/images/inbong.png"
            alt="프로필 이미지"
          />
          <button class="edit-profile-btn">프로필수정</button>
        </div>
        <div>
          <div class="nickname" id="username"></div>
          <div class="description">안녕하세요! 저는 여행을 좋아합니다! 플래니와 함께 떠는 즐거운 여행😆</div>
        </div>
      </div>

      <div class="profile-modal" id="editProfileModal">
        <div class="profile-modal-content">
          <span class="close-profile">&times;</span>

          <!-- 프로필 이미지 + 버튼 같이 묶음 -->
          <div class="profile-image-block">
            <img
              id="previewImage"
              src="./assets/images/default.jpg"
              alt="미리보기"
            />
            <label for="imageInput" class="upload-btn">프로필 사진 선택</label>
            <input type="file" id="imageInput" accept="image/*" />
          </div>

          <!-- 닉네임/소개 -->
          <input type="text" id="editNickname" placeholder="닉네임" />
          <textarea
            id="editDescription"
            rows="3"
            placeholder="자기소개를 입력하세요"
          ></textarea>

          <button id="saveProfileBtn">저장</button>
        </div>
      </div>

      <!-- 아이콘 탭 (그리드/일정 전환) -->
      <div class="profile-tabs">
        <i class="fas fa-th active"></i>
        <i class="fas fa-calendar-alt"></i>
      </div>

      <!-- 갤러리 탭 -->
      <div class="gallery-tab">
        <div class="photo-grid">
          <!-- 여기에 JS로 gallery-photo 자동 삽입됨 -->
        </div>
      </div>

      <!-- 새 다이어리 작성 모달 -->
      <div class="diary-modal" id="newDiaryModal">
        <div class="diary-content">
          <span class="close-new-diary" id="closeNewDiary">&times;</span>
          <h2>새 다이어리 작성</h2>

          <input type="text" id="newTitle" placeholder="여행 제목" />

          <div class="date-group">
            <input type="date" id="newStartDate" />
            <span>~</span>
            <input type="date" id="newEndDate" />
          </div>

          <input
            type="text"
            id="newRoute"
            placeholder="여행 경로 (예: 김포공항 → 도쿄공항)"
          />
          <div class="file-upload-wrapper">
            <label for="newPhotos" class="file-upload-label">사진 선택</label>
            <input type="file" id="newPhotos" multiple />
          </div>

          <textarea
            id="newDiaryText"
            placeholder="여행 일기를 작성해보세요..."
          ></textarea>

          <button id="saveNewDiary">저장</button>
        </div>
      </div>

      <!-- 다이어리 모달 -->
      <div class="diary-modal" id="diaryModal">
        <div class="diary-content">
          <span class="close-diary">&times;</span>

          <!-- 사진 슬라이더 -->
          <div class="photo-slider">
            <!-- JS로 이미지 삽입됨 -->
            <div class="slide-controls">
              <button class="prev-btn">&lt;</button>
              <button class="next-btn">&gt;</button>
            </div>
          </div>

          <!-- 여행 정보 -->
          <div class="diary-info">
            <h3 class="diary-title">제목 자리</h3>
            <p class="diary-period">기간 자리</p>
            <p class="route">경로 자리</p>
          </div>

          <!-- 여행 일기 작성 -->
          <div class="diary-textarea-wrapper">
            <textarea
              id="diaryText"
              readonly
              placeholder="여행 일기를 작성해보세요..."
            ></textarea>
            <div class="diary-actions">
              <button id="editBtn">수정</button>
              <button id="cancelBtn" style="display: none">취소</button>
              <button id="saveBtn" style="display: none">저장</button>
            </div>
          </div>
        </div>
      </div>

      <!-- 일정 탭 -->
      <div class="calendar-tab" style="display: none">
        <div class="calendar-grid">
          <!-- JS로 일정 카드(plan-card) 자동 삽입됨 -->
        </div>
      </div>
    </div>

    <script src="./js/layout.js"></script>
    <script defer src="./js/mypage.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", applyCommonLayout);
    </script>
  </body>
</html>
