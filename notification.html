<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>내 알림</title>

    <!-- 공통 및 페이지별 스타일 -->
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/notification.css" />
  </head>
  <body>
    <div class="wrapper">
      <div class="container fade-in-up">
        <!-- 알림 창 상단 제목 -->
        <h2 class="page-title">🔔 내 알림</h2>

        <!-- 알림 리스트 -->
        <ul class="notification-list">
          <!-- 일정 알림 -->
          <li onclick="location.href='schedule.html'">
            <div class="notification-title">⏰ 일정 알림</div>
            <p class="message">도쿄 여행까지 3일 남았어요!</p>

            <!-- 해당 알림이 유저에게 보내졌던 시간 -->
            <span class="timestamp">3시간 전</span>
          </li>

          <!-- 추천하는 여행지 섹션으로 이동하는 정보성 알림 -->
          <li onclick="location.href='country/vietnam.html'">
            <div class="notification-title">🌍 여행 추천</div>
            <p class="message">요즘 뜨는 여행지! 베트남 호치민은 어떠신가요?</p>
            <!-- 해당 알림이 유저에게 보내졌던 시간 -->
            <span class="timestamp">어제</span>
          </li>

          <!-- 다녀온 여행지의 리뷰를 유도하는 광고성(?) 알림 -->
          <li onclick="location.href='review.html'">
            <div class="notification-title">📝 리뷰 요청</div>
            <p class="message">
              저번에 부산 여행 재밌으셨나요? <br />
              다른 사람들을 위해 리뷰를 작성해주세요!
            </p>
            <!-- 해당 알림이 유저에게 보내졌던 시간 -->
            <span class="timestamp">2일 전</span>
          </li>
        </ul>
      </div>
    </div>

    <!-- 페이지 스크립트 (공통 하단 네비게이션) -->
    <script src="js/layout.js"></script>
    <script>
      // 공통 레이아웃 적용 (바텀 네비게이션 포함)
      document.addEventListener("DOMContentLoaded", applyCommonLayout);
    </script>
  </body>
</html>
