<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>인원 선택</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <h1>여행 인원을 선택하세요</h1>
  </header>

  <main class="container">
    <section class="people-select">
      <h2>몇 명이 함께하나요?</h2>
      <div class="button-group">
        <button onclick="selectPeople(1)">1명</button>
        <button onclick="selectPeople(2)">2명</button>
        <button onclick="selectPeople(3)">3명</button>
        <button onclick="selectPeople(4)">4명</button>
        <button onclick="selectPeople(5)">5명 이상</button>
      </div>
    </section>
  </main>

  <footer class="footer">
    <small>© 2025 Trip Planner</small>
  </footer>

  <script src="js/people.js"></script>
</body>
</html>
