<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>추천 장소 선택</title>
  <link rel="stylesheet" href="css/style.css">

 
  <script src="js/config.js"></script>
  
  <script>
    const script = document.createElement('script');
    script.src = `https://maps.googleapis.com/maps/api/js?key=${CONFIG.GOOGLE_MAPS_API_KEY}`;
    document.head.appendChild(script);
  </script>
</head>
<body>
  <header class="header">
    <h1>추천 장소 선택</h1>
  </header>

  <main class="container map-layout">
    <div id="map" style="height: 60vh;"></div>

    <div id="place-list" class="place-list" style="height: 40vh; overflow-y: auto; padding: 1rem;">
      <h2>추천 장소 목록</h2>
      <form id="places-form"></form>

      <button onclick="saveSelectedPlaces()" style="margin-top: 1rem;">내 일정으로 담기</button>
    </div>
  </main>

  <footer class="footer">
    <small>© 2025 Trip Planner</small>
  </footer>

  <script src="js/place-select.js"></script>
</body>
</html>
