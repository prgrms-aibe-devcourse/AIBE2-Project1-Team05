<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Planite 일정 상세</title>
    <link rel="stylesheet" href="css/schedule.css" />
  </head>
  <body>
    <div class="container">
      <header class="top-info">
        <h2>도쿄 여행 <span class="edit">편집</span></h2>
        <p>2025.4.28 ~ 4.29</p>
        <p>혼자 외 2 | SNS 핫플레이스 외 1</p>
      </header>

      <div class="button-group">
        <button class="primary">+ 일행과 함께 일정짜기</button>
        <button class="secondary">% 셀프패키지</button>
      </div>

      <div class="filter-group">
        <button>항공편</button>
        <button>숙소</button>
        <button>체크리스트</button>
        <button>가계부</button>
      </div>

      <div class="map-area">
        <div class="map-placeholder">지도 표시 영역</div>
      </div>

      <section class="schedule-section">
        <h3>day 1 - 4.28 / 월 <span class="edit-link">편집</span></h3>
        <div class="schedule-list">
          <div class="schedule-item">
            <div class="circle">1</div>
            <div class="schedule-content">
              <p>나리타 국제공항</p>
              <small>관광명소 - 예약가능</small>
            </div>
          </div>
          <div class="schedule-item">
            <div class="circle">2</div>
            <div class="schedule-content">
              <p>아사쿠사</p>
              <small>관광명소 - 아사쿠사 예약가능</small>
            </div>
          </div>
          <div class="schedule-item">
            <div class="circle">3</div>
            <div class="schedule-content">
              <p>아사쿠사 규카츠</p>
            </div>
          </div>
        </div>
      </section>
    </div>

    <script src="js/schedule.js"></script>
  </body>
</html>
