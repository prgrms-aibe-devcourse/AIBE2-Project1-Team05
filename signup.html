<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <h1>회원가입</h1>
  </header>

  <main class="container">
    <section class="signup-form">
      <form id="signupForm">
        <input type="email" id="signup-email" placeholder="이메일" required style="width:100%; padding:1rem; margin:0.5rem 0;"/>
        <input type="password" id="signup-password" placeholder="비밀번호" required style="width:100%; padding:1rem; margin:0.5rem 0;"/>
        <button type="submit">회원가입</button>
      </form>

      <p style="text-align:center; margin-top:1rem;">
        이미 계정이 있으신가요? <a href="login.html">로그인</a>
      </p>
    </section>
  </main>

  <footer class="footer">
    <small>© 2025 Trip Planner</small>
  </footer>

  <script src="js/auth.js"></script>
</body>
</html>
