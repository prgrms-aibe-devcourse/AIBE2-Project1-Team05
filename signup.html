<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLANITE - 회원가입</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="logo">
        <img src="assets/images/planite.png" alt="Planite 로고">
        <div class="logo-text">Planite</div>
    </div>
    <div class="slogan">새로운 우주 여행자님 환영합니다</div>
    
    <div class="form-container">
        <form id="signupForm" class="input-container">
            <input type="text" class="nickname-input" id="nickname" placeholder="닉네임을 입력해주세요" 
                  maxlength="10" pattern="[가-힣A-Za-z0-9]{2,10}" required>
            <button type="submit" class="start-button">
                <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </form>
        <div class="auth-links">
            이미 가입하셨나요? <a href="login.html">로그인</a>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const nickname = document.getElementById('nickname').value;
            
            // 닉네임 유효성 검사
            if (nickname.length < 2 || nickname.length > 10) {
                alert('닉네임은 2-10자 사이여야 합니다.');
                return;
            }

            // 이미 등록된 닉네임인지 확인
            const registeredUsers = JSON.parse(localStorage.getItem('registeredUsers') || '[]');
            if (registeredUsers.includes(nickname)) {
                alert('이미 등록된 닉네임입니다. 다른 닉네임을 선택해주세요.');
                return;
            }
            
            // 새로운 닉네임을 등록된 사용자 목록에 추가
            registeredUsers.push(nickname);
            localStorage.setItem('registeredUsers', JSON.stringify(registeredUsers));
            
            alert('회원가입이 완료되었습니다. 로그인 페이지로 이동합니다.');
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
