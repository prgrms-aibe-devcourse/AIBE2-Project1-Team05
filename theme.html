<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>테마 선택</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <h1>여행 테마를 선택하세요</h1>
  </header>

  <main class="container">
    <section class="theme-select">
      <h2>선호하는 테마를 골라주세요</h2>
      <form id="theme-form" class="theme-form">
        <label><input type="checkbox" name="theme" value="도시"> 도시</label><br/>
        <label><input type="checkbox" name="theme" value="자연"> 자연</label><br/>
        <label><input type="checkbox" name="theme" value="액티비티"> 액티비티</label><br/>
      </form>

      <button onclick="saveThemes()">다음 →</button>
    </section>
  </main>

  <footer class="footer">
    <small>© 2025 Trip Planner</small>
  </footer>

  <script src="js/theme.js"></script>
</body>
</html>
